        <section id="jeremy">
            <h2>Jeremy</h2>
            <p>f is a function from strings to booleans. Figure out how it is defined.</p>
            
            <div class="jeremy-function">
                <p>f(    
                <input type="text" id="inputWord" placeholder="" oninput="reverseWord()" />
                ) = <amogus id="output"></amogus></p>

                <script>
                    function reverseWord() {
                        const input = document.getElementById("inputWord").value.toLowerCase();
                        
                        let sum = 0;
                        
                        for (let i = 0; i < input.length; i++) {
                            const code = input.charCodeAt(i);
                            // a = 97, b = 98, ..., z = 122
                            if (code >= 97 && code <= 122) {
                                sum += (code - 96);
                            }
                        }
                        
                        const sqrt = Math.sqrt(sum);
                        const isSquare = Number.isInteger(sqrt);
                        
                        document.getElementById("output").textContent = isSquare ? "True" : "False";
                    }
                </script>
            </div>
        </section>
